<svg width="620" height="42" viewBox="0 0 620 42" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sweep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D8B26B" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D8B26B" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#D8B26B" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

  <!-- corner brackets -->
  <path d="M2,2 L2,12 M2,2 L12,2" stroke="#D8B26B" stroke-width="1.6" fill="none" opacity="0.8"/>
  <path d="M618,2 L618,12 M618,2 L608,2" stroke="#D8B26B" stroke-width="1.6" fill="none" opacity="0.8"/>
  <path d="M2,40 L2,30 M2,40 L12,40" stroke="#D8B26B" stroke-width="1.6" fill="none" opacity="0.8"/>
  <path d="M618,40 L618,30 M618,40 L608,40" stroke="#D8B26B" stroke-width="1.6" fill="none" opacity="0.8"/>

  <line x1="20" y1="21" x2="600" y2="21" stroke="#D8B26B" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="20" y="15" width="580" height="12" fill="url(#sweep)" filter="url(#softGlow)">
    <animateTransform attributeName="transform" type="translate" values="-300,0; 300,0; -300,0" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" keyTimes="0;0.5;1"/>
  </rect>

  <circle cx="255" cy="21" r="4.5" fill="#D8B26B">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4.5;3;4.5" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="255" cy="21" r="8" fill="none" stroke="#D8B26B" stroke-width="1">
    <animate attributeName="r" values="5;11" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0" dur="1.6s" repeatCount="indefinite"/>
  </circle>

  <text x="270" y="26" font-family="'Courier New', Consolas, monospace" font-size="15" font-weight="700" letter-spacing="2" fill="#F4EFE6">CONNECT</text>
  <rect x="378" y="10" width="2.4" height="15" fill="#F4EFE6">
    <animate attributeName="opacity" values="1;0" dur="0.9s" repeatCount="indefinite"/>
  </rect>

  <text x="30" y="26" font-family="'Courier New', Consolas, monospace" font-size="13" fill="#D8B26B" opacity="0.85">[</text>
  <text x="590" y="26" font-family="'Courier New', Consolas, monospace" font-size="13" fill="#D8B26B" opacity="0.85">]</text>
</svg>
